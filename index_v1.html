<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Portfolio Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #263348;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-orange: #f97316;
            --accent-yellow: #eab308;
            --accent-purple: #a855f7;
            --risk-high: #ef4444;
            --risk-medium: #f97316;
            --risk-low: #22c55e;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            direction: rtl;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), #0f1d32);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Summary Bar */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 20px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .summary-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid var(--border);
        }

        .summary-card .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .summary-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .summary-card .sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            padding: 20px 32px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .search-input {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            width: 200px;
            direction: rtl;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { outline: none; border-color: var(--accent-blue); }

        /* Grid */
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 20px;
            padding: 0 32px 32px;
        }

        /* Client Card */
        .client-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .client-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .client-name {
            font-size: 16px;
            font-weight: 700;
        }

        .risk-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-badge.high {
            background: rgba(239,68,68,0.15);
            color: var(--risk-high);
            border: 1px solid rgba(239,68,68,0.3);
        }

        .risk-badge.medium {
            background: rgba(249,115,22,0.15);
            color: var(--risk-medium);
            border: 1px solid rgba(249,115,22,0.3);
        }

        .risk-badge.low {
            background: rgba(34,197,94,0.15);
            color: var(--risk-low);
            border: 1px solid rgba(34,197,94,0.3);
        }

        .card-body {
            padding: 16px 20px;
            display: flex;
            gap: 20px;
        }

        .chart-container {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .card-performance {
            padding: 0 20px 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-performance-chart {
            width: 100%;
            height: 80px;
        }

        .holdings-summary {
            flex: 1;
            min-width: 0;
        }

        .allocation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(51,65,85,0.5);
            font-size: 13px;
        }

        .allocation-row:last-child { border-bottom: none; }

        .allocation-label {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .allocation-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .allocation-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-footer {
            padding: 12px 20px;
            background: rgba(15,23,42,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .portfolio-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .portfolio-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-body { padding: 24px; }

        .modal-chart-container {
            width: 250px;
            height: 250px;
            margin: 0 auto 24px;
        }

        .modal-performance-container {
            width: 100%;
            height: 280px;
            margin-bottom: 24px;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .modal-performance-container h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .modal-charts-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .modal-charts-row > div {
            flex: 1;
        }

        @media (max-width: 768px) {
            .modal-charts-row { flex-direction: column; }
        }

        /* Fullscreen Chart Overlay */
        .fullscreen-chart-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 30px;
        }

        .fullscreen-chart-overlay.active { display: flex; }

        .fullscreen-chart-box {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .fullscreen-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .fullscreen-chart-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .fullscreen-chart-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: inherit;
        }

        .zoom-btn:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .zoom-btn.reset {
            width: auto;
            padding: 0 12px;
            font-size: 12px;
        }

        .fullscreen-chart-body {
            flex: 1;
            padding: 20px;
            position: relative;
        }

        .expand-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(15,23,42,0.8);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 5;
        }

        .expand-btn:hover {
            background: var(--accent-blue);
            color: white;
        }

        .chart-wrapper-relative {
            position: relative;
        }

        .zoom-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            padding: 6px 0 0;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .modal-stat {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .modal-stat .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .modal-stat .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .holdings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .holdings-table th {
            text-align: right;
            padding: 10px 12px;
            background: var(--bg-primary);
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .holdings-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(51,65,85,0.3);
            color: var(--text-secondary);
        }

        .holdings-table tr:hover td {
            background: rgba(59,130,246,0.05);
        }

        .asset-type-badge {
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
        }

        .asset-type-badge.stock {
            background: rgba(59,130,246,0.15);
            color: var(--accent-blue);
        }

        .asset-type-badge.bond {
            background: rgba(168,85,247,0.15);
            color: var(--accent-purple);
        }

        .price-change.positive { color: var(--accent-green); }
        .price-change.negative { color: var(--accent-red); }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .clients-grid {
                grid-template-columns: 1fr;
                padding: 0 16px 16px;
            }
            .header { padding: 16px; }
            .summary-bar { padding: 16px; }
            .filters { padding: 16px; }
            .card-body { flex-direction: column; align-items: center; }
            .modal-stats { grid-template-columns: 1fr; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">טוען נתוני שוק...</div>
</div>

<header class="header">
    <h1>Dashboard Portfolio Manager</h1>
    <div class="header-info">
        <div class="refresh-indicator">
            <span class="dot"></span>
            <span id="lastUpdate">מעדכן...</span>
        </div>
        <button class="filter-btn" onclick="refreshAllPrices()" title="רענן מחירים">רענן נתונים</button>
    </div>
</header>

<div class="summary-bar" id="summaryBar"></div>

<div class="filters">
    <div class="filter-group">
        <label>פרופיל סיכון:</label>
        <button class="filter-btn active" data-filter="risk" data-value="all" onclick="setFilter('risk', 'all', this)">הכל</button>
        <button class="filter-btn" data-filter="risk" data-value="high" onclick="setFilter('risk', 'high', this)">גבוה</button>
        <button class="filter-btn" data-filter="risk" data-value="medium" onclick="setFilter('risk', 'medium', this)">בינוני</button>
        <button class="filter-btn" data-filter="risk" data-value="low" onclick="setFilter('risk', 'low', this)">נמוך</button>
    </div>
    <div class="filter-group">
        <label>סוג נכס:</label>
        <button class="filter-btn active" data-filter="asset" data-value="all" onclick="setFilter('asset', 'all', this)">הכל</button>
        <button class="filter-btn" data-filter="asset" data-value="stocks" onclick="setFilter('asset', 'stocks', this)">מניות</button>
        <button class="filter-btn" data-filter="asset" data-value="bonds" onclick="setFilter('asset', 'bonds', this)">אג"ח</button>
    </div>
    <div class="filter-group">
        <input type="text" class="search-input" placeholder="חיפוש לקוח..." oninput="searchClients(this.value)" />
    </div>
</div>

<div class="clients-grid" id="clientsGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalContent"></div>
</div>

<div class="fullscreen-chart-overlay" id="fullscreenOverlay" onclick="closeFullscreen(event)">
    <div class="fullscreen-chart-box">
        <div class="fullscreen-chart-header">
            <h3 id="fullscreenTitle">מעקב תשואה</h3>
            <div class="fullscreen-chart-controls">
                <button class="zoom-btn" onclick="fullscreenZoom('in')" title="זום אין">+</button>
                <button class="zoom-btn" onclick="fullscreenZoom('out')" title="זום אאוט">−</button>
                <button class="zoom-btn reset" onclick="fullscreenZoom('reset')" title="איפוס זום">איפוס</button>
                <button class="modal-close" onclick="closeFullscreen()" title="סגור">&times;</button>
            </div>
        </div>
        <div class="fullscreen-chart-body">
            <canvas id="fullscreen-chart"></canvas>
        </div>
        <div class="zoom-hint">גלגל עכבר לזום | גרור לצפייה | לחץ פעמיים לאיפוס</div>
    </div>
</div>

<script>
// ========== DATA ==========

const ISRAELI_NAMES = [
    'יונתן כהן', 'נועה לוי', 'אורי גולדברג', 'מיכל אברהם', 'דניאל שרון',
    'רונית פרידמן', 'עידו מזרחי', 'שירה ביטון', 'אלון דוד', 'תמר רוזנברג',
    'גיל חדד', 'ליאור אוחיון', 'הדס ברקוביץ', 'עומר נחמיאס', 'רותם קפלן',
    'אביגיל שטרן', 'איתי וקנין', 'ענבל סויסה', 'נדב פינטו', 'מאיה הרשקוביץ'
];

const NASDAQ_100_TICKERS = [
    'AAPL', 'MSFT', 'AMZN', 'NVDA', 'GOOGL', 'META', 'TSLA', 'AVGO', 'COST', 'NFLX',
    'AMD', 'ADBE', 'PEP', 'CSCO', 'INTC', 'CMCSA', 'TMUS', 'AMGN', 'TXN', 'QCOM',
    'INTU', 'ISRG', 'AMAT', 'HON', 'BKNG', 'LRCX', 'SBUX', 'MDLZ', 'ADI', 'VRTX',
    'GILD', 'ADP', 'REGN', 'PANW', 'SNPS', 'KLAC', 'CDNS', 'MELI', 'MNST', 'PYPL',
    'CRWD', 'ORLY', 'MAR', 'ABNB', 'MRVL', 'CTAS', 'FTNT', 'CEG', 'DASH', 'NXPI'
];

const SP500_TICKERS = [
    'JPM', 'V', 'UNH', 'XOM', 'MA', 'JNJ', 'PG', 'HD', 'ABBV', 'MRK',
    'CVX', 'LLY', 'BAC', 'KO', 'PFE', 'WMT', 'TMO', 'CRM', 'DIS', 'ABT',
    'DHR', 'VZ', 'NEE', 'PM', 'RTX', 'BMY', 'SCHW', 'UPS', 'T', 'MS',
    'GS', 'BLK', 'LOW', 'SPGI', 'CAT', 'DE', 'BA', 'GE', 'MMM', 'IBM',
    'AXP', 'MDLZ', 'CB', 'CI', 'SO', 'MO', 'PLD', 'TGT', 'ZTS', 'NOW'
];

const ALL_TICKERS = [...new Set([...NASDAQ_100_TICKERS, ...SP500_TICKERS])];

const BONDS = [
    { id: 'IL_CPI_1', name: 'אג"ח ממשלתי צמוד 0523', type: 'il_cpi', basePrice: 112.5 },
    { id: 'IL_CPI_2', name: 'אג"ח ממשלתי צמוד 0825', type: 'il_cpi', basePrice: 105.8 },
    { id: 'IL_CPI_3', name: 'אג"ח ממשלתי צמוד 1127', type: 'il_cpi', basePrice: 98.3 },
    { id: 'IL_CPI_4', name: 'גליל צמוד 0530', type: 'il_cpi', basePrice: 101.2 },
    { id: 'US_30Y', name: 'US Treasury 30Y (TLT)', type: 'us_30y', ticker: 'TLT', basePrice: 92.0 },
    { id: 'US_30Y_2', name: 'US Treasury Bond ETF (VGLT)', type: 'us_30y', ticker: 'VGLT', basePrice: 58.0 },
];

// Price cache
let priceCache = {};
let clients = [];
let charts = {};
let activeFilters = { risk: 'all', asset: 'all', search: '' };
let currentModalClientId = null;
let fullscreenChartInstance = null;

// ========== UTILITY ==========

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function pickRandom(arr, n) {
    return shuffle(arr).slice(0, n);
}

function formatCurrency(val, currency = 'USD') {
    if (currency === 'ILS') {
        return val.toLocaleString('he-IL', { style: 'currency', currency: 'ILS', maximumFractionDigits: 0 });
    }
    return val.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
}

function formatNumber(val) {
    return val.toLocaleString('he-IL', { maximumFractionDigits: 2 });
}

// ========== PRICE FETCHING ==========

function fetchWithTimeout(url, timeoutMs = 3000) {
    return Promise.race([
        fetch(url),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeoutMs))
    ]);
}

async function fetchStockPrice(ticker) {
    try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
        const response = await fetchWithTimeout(url, 3000);
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        const meta = data.chart.result[0].meta;
        return {
            price: meta.regularMarketPrice,
            previousClose: meta.previousClose || meta.chartPreviousClose,
            currency: meta.currency
        };
    } catch (e) {
        return null;
    }
}

function generateSimulatedPrice(ticker, baseMin = 20, baseMax = 500) {
    // Deterministic base from ticker, with random daily variation
    let hash = 0;
    for (let i = 0; i < ticker.length; i++) hash = ((hash << 5) - hash) + ticker.charCodeAt(i);
    const base = baseMin + (Math.abs(hash) % (baseMax - baseMin));
    const variation = (Math.random() - 0.5) * base * 0.04;
    const price = base + variation;
    const previousClose = price - (Math.random() - 0.5) * price * 0.03;
    return { price: Math.round(price * 100) / 100, previousClose: Math.round(previousClose * 100) / 100, currency: 'USD' };
}

async function fetchAllPrices(tickers) {
    const uniqueTickers = [...new Set(tickers)];
    const results = {};

    // Quick test: can we reach Yahoo Finance at all? (3 second timeout)
    let apiAvailable = false;
    try {
        const testResponse = await fetchWithTimeout(
            `https://query1.finance.yahoo.com/v8/finance/chart/AAPL?interval=1d&range=1d`, 3000
        );
        if (testResponse.ok) {
            apiAvailable = true;
            const data = await testResponse.json();
            const meta = data.chart.result[0].meta;
            results['AAPL'] = {
                price: meta.regularMarketPrice,
                previousClose: meta.previousClose || meta.chartPreviousClose,
                currency: meta.currency
            };
        }
    } catch (e) {}

    if (apiAvailable) {
        // Fetch remaining tickers in parallel batches
        const remaining = uniqueTickers.filter(t => t !== 'AAPL');
        const batchSize = 10;
        for (let i = 0; i < remaining.length; i += batchSize) {
            const batch = remaining.slice(i, i + batchSize);
            const promises = batch.map(async (ticker) => {
                const result = await fetchStockPrice(ticker);
                if (result) results[ticker] = result;
            });
            await Promise.all(promises);
        }
    }

    // Fill any missing tickers with simulated prices
    for (const t of uniqueTickers) {
        if (!results[t]) results[t] = generateSimulatedPrice(t);
    }
    return results;
}

// ========== CLIENT GENERATION ==========

function generateClients() {
    const names = shuffle(ISRAELI_NAMES);
    const clients = [];

    const riskProfiles = [
        ...Array(5).fill({ risk: 'high', stockPct: 80, bondPct: 20, label: 'גבוה' }),
        ...Array(5).fill({ risk: 'medium', stockPct: 50, bondPct: 50, label: 'בינוני' }),
        ...Array(10).fill({ risk: 'low', stockPct: 15, bondPct: 85, label: 'נמוך' }),
    ];

    for (let i = 0; i < 20; i++) {
        const profile = riskProfiles[i];
        const portfolioValue = 100000 + Math.floor(Math.random() * 900000); // 100K-1M

        // Pick random stocks (3-6 per client)
        const numStocks = 3 + Math.floor(Math.random() * 4);
        const selectedStocks = pickRandom(ALL_TICKERS, numStocks);

        // Pick random bonds (2-3 per client)
        const numBonds = 2 + Math.floor(Math.random() * 2);
        const selectedBonds = pickRandom(BONDS, numBonds);

        // Calculate stock allocations
        const stockTotal = profile.stockPct;
        const stockAllocations = distributePercentage(stockTotal, numStocks);

        // Calculate bond allocations
        const bondTotal = profile.bondPct;
        const bondAllocations = distributePercentage(bondTotal, numBonds);

        const holdings = [];

        selectedStocks.forEach((ticker, j) => {
            const allocValue = portfolioValue * stockAllocations[j] / 100;
            // Cost basis: simulate buying at a price -15% to +10% from current
            const costVariation = 1 + (Math.random() * 0.25 - 0.15);
            holdings.push({
                ticker,
                name: ticker,
                type: 'stock',
                typeLabel: 'מניה',
                allocationPct: stockAllocations[j],
                value: allocValue,
                costBasis: allocValue / costVariation,
                shares: 0,
                price: 0,
                previousClose: 0,
                currency: 'USD'
            });
        });

        selectedBonds.forEach((bond, j) => {
            const allocValue = portfolioValue * bondAllocations[j] / 100;
            const costVariation = 1 + (Math.random() * 0.08 - 0.03);
            holdings.push({
                ticker: bond.ticker || bond.id,
                name: bond.name,
                type: 'bond',
                typeLabel: 'אג"ח',
                allocationPct: bondAllocations[j],
                value: allocValue,
                costBasis: allocValue / costVariation,
                shares: 0,
                price: bond.basePrice,
                previousClose: bond.basePrice * (1 + (Math.random() - 0.5) * 0.01),
                currency: bond.type === 'il_cpi' ? 'ILS' : 'USD'
            });
        });

        const initialInvestment = holdings.reduce((s, h) => s + h.costBasis, 0);

        clients.push({
            id: i + 1,
            name: names[i],
            risk: profile.risk,
            riskLabel: profile.label,
            stockPct: profile.stockPct,
            bondPct: profile.bondPct,
            portfolioValue,
            initialInvestment,
            holdings
        });
    }

    return clients;
}

function distributePercentage(total, count) {
    const parts = [];
    let remaining = total;
    for (let i = 0; i < count - 1; i++) {
        const min = Math.max(1, Math.floor(remaining / (count - i) * 0.4));
        const max = Math.floor(remaining / (count - i) * 1.6);
        const part = min + Math.floor(Math.random() * (max - min + 1));
        const clamped = Math.min(part, remaining - (count - i - 1));
        parts.push(clamped);
        remaining -= clamped;
    }
    parts.push(remaining);
    return parts;
}

// ========== PERFORMANCE HISTORY ==========

function generatePerformanceHistory(client) {
    const history = [];
    let value = client.initialInvestment;
    const today = new Date();
    const startDate = new Date(2019, 0, 1); // January 1, 2019

    // Calculate total days from start to today
    const totalDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));

    // Volatility based on risk profile
    const volatility = { high: 0.014, medium: 0.009, low: 0.004 };
    const drift = { high: 0.0003, medium: 0.00025, low: 0.00015 };
    const vol = volatility[client.risk];
    const d = drift[client.risk];

    // Sample weekly to keep data manageable (~300+ points)
    for (let i = 0; i <= totalDays; i += 5) {
        const date = new Date(startDate);
        date.setDate(date.getDate() + i);
        // Skip weekends
        if (date.getDay() === 0 || date.getDay() === 6) continue;

        // Add some market events (COVID crash, recovery, etc.)
        let eventMultiplier = 1;
        const y = date.getFullYear();
        const m = date.getMonth();
        if (y === 2020 && m >= 1 && m <= 3) eventMultiplier = 0.97; // COVID crash
        if (y === 2020 && m >= 4 && m <= 8) eventMultiplier = 1.02; // Recovery
        if (y === 2022 && m >= 0 && m <= 9) eventMultiplier = 0.995; // Bear market

        const dailyReturn = (d + vol * (Math.random() * 2 - 1)) * eventMultiplier;
        value = value * (1 + dailyReturn);

        history.push({
            date: date.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' }),
            monthLabel: date.toLocaleDateString('he-IL', { month: 'short', year: '2-digit' }),
            yearLabel: date.getFullYear().toString(),
            month: date.getMonth(),
            year: date.getFullYear(),
            value: Math.round(value),
            returnPct: ((value - client.initialInvestment) / client.initialInvestment * 100)
        });
    }

    // Make the last point match current portfolio value
    if (history.length > 0) {
        history[history.length - 1].value = Math.round(client.portfolioValue);
        history[history.length - 1].returnPct = ((client.portfolioValue - client.initialInvestment) / client.initialInvestment * 100);
    }

    client.performanceHistory = history;
}

// ========== SMART LABELS (zoom-aware) ==========

function getSmartLabel(hist, index, chart) {
    // Determine visible range
    const xScale = chart.scales.x;
    const minIndex = Math.max(0, Math.floor(xScale.min || 0));
    const maxIndex = Math.min(hist.length - 1, Math.ceil(xScale.max || hist.length - 1));
    const visibleCount = maxIndex - minIndex + 1;

    const point = hist[index];
    if (!point) return null;

    // Calculate how many years are visible
    const startYear = hist[minIndex] ? hist[minIndex].year : point.year;
    const endYear = hist[maxIndex] ? hist[maxIndex].year : point.year;
    const yearSpan = endYear - startYear;

    if (yearSpan > 1 || visibleCount > 150) {
        // Zoomed out: show years - only at first occurrence of each year
        if (index === 0 || point.year !== hist[index - 1].year) {
            return point.yearLabel;
        }
        return null;
    } else {
        // Zoomed in: show months - only at first occurrence of each month
        if (index === 0 || point.month !== hist[index - 1].month || point.year !== hist[index - 1].year) {
            return point.monthLabel;
        }
        return null;
    }
}

// ========== UPDATE PRICES ==========

async function updatePricesForClients() {
    // Collect all stock tickers
    const allStockTickers = [];
    const bondTickers = [];
    clients.forEach(c => {
        c.holdings.forEach(h => {
            if (h.type === 'stock') allStockTickers.push(h.ticker);
            else if (h.type === 'bond' && h.ticker && !h.ticker.startsWith('IL_')) {
                bondTickers.push(h.ticker);
            }
        });
    });

    const allTickers = [...new Set([...allStockTickers, ...bondTickers])];
    priceCache = await fetchAllPrices(allTickers);

    // Update holdings with real prices
    clients.forEach(c => {
        let totalValue = 0;
        c.holdings.forEach(h => {
            if (priceCache[h.ticker]) {
                h.price = priceCache[h.ticker].price;
                h.previousClose = priceCache[h.ticker].previousClose;
                h.currency = priceCache[h.ticker].currency || h.currency;
            } else if (h.type === 'bond' && h.ticker.startsWith('IL_')) {
                // Israeli bonds - simulate small daily change
                h.price = h.price * (1 + (Math.random() - 0.5) * 0.005);
                h.previousClose = h.price * (1 + (Math.random() - 0.5) * 0.003);
            }
            h.shares = h.price > 0 ? Math.floor(h.value / h.price) : 0;
            h.value = h.shares * h.price;
            totalValue += h.value;
        });
        // Recalculate percentages based on actual values
        if (totalValue > 0) {
            c.portfolioValue = totalValue;
            c.holdings.forEach(h => {
                h.allocationPct = (h.value / totalValue * 100);
            });
            c.stockPct = c.holdings.filter(h => h.type === 'stock').reduce((sum, h) => sum + h.allocationPct, 0);
            c.bondPct = c.holdings.filter(h => h.type === 'bond').reduce((sum, h) => sum + h.allocationPct, 0);
        }
    });
}

function renderSummaryBar() {
    const totalAUM = clients.reduce((sum, c) => sum + c.portfolioValue, 0);
    const totalInvested = clients.reduce((sum, c) => sum + c.initialInvestment, 0);
    const totalProfit = totalAUM - totalInvested;
    const totalReturn = totalInvested > 0 ? (totalProfit / totalInvested * 100) : 0;
    const profitClass = totalProfit >= 0 ? 'positive' : 'negative';
    const profitSign = totalProfit >= 0 ? '+' : '';

    const highClients = clients.filter(c => c.risk === 'high');
    const medClients = clients.filter(c => c.risk === 'medium');
    const lowClients = clients.filter(c => c.risk === 'low');

    function groupReturn(group) {
        const inv = group.reduce((s, c) => s + c.initialInvestment, 0);
        const val = group.reduce((s, c) => s + c.portfolioValue, 0);
        const ret = inv > 0 ? ((val - inv) / inv * 100) : 0;
        const cls = ret >= 0 ? 'positive' : 'negative';
        const sgn = ret >= 0 ? '+' : '';
        return `<span class="price-change ${cls}">${sgn}${ret.toFixed(2)}%</span>`;

    document.getElementById('summaryBar').innerHTML = `

                <div class="modal-stat">
                    <div class="stat-label">שווי תיק כולל</div>
                    <div class="stat-value" style="color: var(--accent-green)">${formatCurrency(client.portfolioValue)}</div>
                </div>
                <div class="modal-stat">
                    <div class="stat-label">סכום השקעה ראשונית</div>
                    <div class="stat-value" style="color: var(--text-secondary)">${formatCurrency(client.initialInvestment)}</div>
                </div>
                <div class="modal-stat">
                    <div class="stat-label">רווח/הפסד כולל</div>
                    <div class="stat-value price-change ${totalProfitClass}">${totalProfitSign}${formatCurrency(Math.abs(totalProfit))}</div>
                </div>
                <div class="modal-stat">
                    <div class="stat-label">תשואה כוללת</div>
                    <div class="stat-value price-change ${totalProfitClass}" style="font-size:22px">${totalProfitSign}${totalReturnPct.toFixed(2)}%</div>
                </div>
                <div class="modal-stat">
                    <div class="stat-label">שווי מניות</div>
                    <div class="stat-value" style="color: var(--accent-blue)">${formatCurrency(totalStockValue)}</div>
                </div>
                <div class="modal-stat">
                    <div class="stat-label">שווי אג"ח</div>
                    <div class="stat-value" style="color: var(--accent-purple)">${formatCurrency(totalBondValue)}</div>
                </div>
            </div>
            <div class="modal-charts-row">
                <div class="modal-chart-container" style="margin:0">
                    <canvas id="modal-chart"></canvas>
                </div>
                <div class="modal-performance-container chart-wrapper-relative">
                    <button class="expand-btn" onclick="openFullscreenChart(currentModalClientId)" title="הגדל גרף">&#x26F6;</button>
                    <h3>מעקב תשואה - 2019 עד היום</h3>
                    <canvas id="modal-perf-chart"></canvas>
                </div>
            </div>
            <table class="holdings-table">
                <thead>
                    <tr>
                        <th>סוג</th>
                        <th>נכס</th>
                        <th>הקצאה</th>
                        <th>מחיר</th>
                        <th>כמות</th>
                        <th>שווי</th>
                        <th>שינוי יומי</th>
                        <th>רווח</th>
                        <th>תשואה</th>
                    </tr>
                </thead>
                <tbody>
                    ${holdingsRows}
                </tbody>
            </table>
        </div>
    `;

    document.getElementById('modalOverlay').classList.add('active');

    // Create modal charts
    setTimeout(() => {
        // Doughnut - allocation breakdown
        const ctx = document.getElementById('modal-chart');
        if (ctx) {
            const labels = client.holdings.map(h => h.type === 'stock' ? h.ticker : h.name.slice(0, 15));
            const data = client.holdings.map(h => h.allocationPct);
            const colors = client.holdings.map(h =>
                h.type === 'stock'
                    ? `hsl(217, ${60 + Math.random() * 30}%, ${45 + Math.random() * 20}%)`
                    : `hsl(270, ${50 + Math.random() * 30}%, ${45 + Math.random() * 20}%)`
            );

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: colors,
                        borderWidth: 2,
                        borderColor: '#1e293b'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    cutout: '45%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            rtl: true,
                            labels: {
                                color: '#94a3b8',
                                font: { size: 11 },
                                padding: 8,
                                usePointStyle: true,
                                pointStyleWidth: 8
                            }
                        },
                        tooltip: {
                            rtl: true,
                            callbacks: {
                                label: (ctx) => ` ${ctx.label}: ${ctx.parsed.toFixed(1)}%`
                            }
                        }
                    }
                }
            });
        }

        // Line chart - performance over time (with zoom)
        const perfCtx = document.getElementById('modal-perf-chart');
        if (perfCtx && client.performanceHistory) {
            const hist = client.performanceHistory;
            const isPositive = hist[hist.length - 1].returnPct >= 0;

            new Chart(perfCtx, {
                type: 'line',
                data: {
                    labels: hist.map((_, i) => i),
                    datasets: [
                        {
                            label: 'תשואה %',
                            data: hist.map(p => p.returnPct),
                            borderColor: isPositive ? '#22c55e' : '#ef4444',
                            backgroundColor: isPositive ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)',
                            borderWidth: 2,
                            fill: true,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: isPositive ? '#22c55e' : '#ef4444',
                            tension: 0.3
                        },
                        {
                            label: 'שווי תיק',
                            data: hist.map(p => p.value),
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            pointHoverBackgroundColor: '#3b82f6',
                            tension: 0.3,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    scales: {
                        x: {
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 11, weight: 'bold' },
                                autoSkip: true,
                                maxRotation: 0,
                                maxTicksLimit: 10,
                                callback: function(val, index) {
                                    return getSmartLabel(hist, index, this.chart);
                                }
                            },
                            grid: { color: 'rgba(51,65,85,0.3)' }
                        },
                        y: {
                            position: 'right',
                            title: { display: true, text: 'תשואה %', color: '#94a3b8', font: { size: 11 } },
                            ticks: { color: '#64748b', font: { size: 10 }, callback: v => v.toFixed(1) + '%' },
                            grid: { color: 'rgba(51,65,85,0.3)' }
                        },
                        y1: {
                            position: 'left',
                            title: { display: true, text: 'שווי ($)', color: '#94a3b8', font: { size: 11 } },
                            ticks: { color: '#64748b', font: { size: 10 }, callback: v => '$' + (v/1000).toFixed(0) + 'K' },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            rtl: true,
                            labels: { color: '#94a3b8', font: { size: 11 }, usePointStyle: true, pointStyleWidth: 8 }
                        },
                        tooltip: {
                            rtl: true,
                            callbacks: {
                                title: (items) => hist[items[0].dataIndex].date,
                                label: (ctx) => {
                                    if (ctx.datasetIndex === 0) return ` תשואה: ${ctx.parsed.y.toFixed(2)}%`;
                                    return ` שווי: $${ctx.parsed.y.toLocaleString()}`;
                                }
                            }
                        },
                        zoom: {
                            pan: { enabled: true, mode: 'x' },
                            zoom: {
                                wheel: { enabled: true, speed: 0.1 },
                                pinch: { enabled: true },
                                mode: 'x'
                            }
                        }
                    }
                }
            });
        }
    }, 100);
}

function closeModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('modalOverlay').classList.remove('active');
    currentModalClientId = null;
}

// ========== FULLSCREEN CHART ==========

function openFullscreenChart(clientId) {
    const client = clients.find(c => c.id === clientId);
    if (!client || !client.performanceHistory) return;

    document.getElementById('fullscreenTitle').textContent = `מעקב תשואה - ${client.name}`;
    document.getElementById('fullscreenOverlay').classList.add('active');

    // Destroy previous instance
    if (fullscreenChartInstance) {
        fullscreenChartInstance.destroy();
        fullscreenChartInstance = null;
    }

    setTimeout(() => {
        const ctx = document.getElementById('fullscreen-chart');
        if (!ctx) return;

        const hist = client.performanceHistory;
        const isPositive = hist[hist.length - 1].returnPct >= 0;

        fullscreenChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: hist.map((_, i) => i),
                datasets: [
                    {
                        label: 'תשואה %',
                        data: hist.map(p => p.returnPct),
                        borderColor: isPositive ? '#22c55e' : '#ef4444',
                        backgroundColor: isPositive ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)',
                        borderWidth: 2.5,
                        fill: true,
                        pointRadius: 3,
                        pointHoverRadius: 7,
                        pointBackgroundColor: isPositive ? '#22c55e' : '#ef4444',
                        pointBorderColor: '#1e293b',
                        pointBorderWidth: 2,
                        tension: 0.3
                    },
                    {
                        label: 'שווי תיק ($)',
                        data: hist.map(p => p.value),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.05)',
                        borderWidth: 2,
                        borderDash: [6, 3],
                        fill: true,
                        pointRadius: 2,
                        pointHoverRadius: 6,
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#1e293b',
                        pointBorderWidth: 2,
                        tension: 0.3,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: {
                        ticks: {
                            color: '#94a3b8',
                            font: { size: 13, weight: 'bold' },
                            autoSkip: true,
                            maxRotation: 0,
                            maxTicksLimit: 15,
                            callback: function(val, index) {
                                return getSmartLabel(hist, index, this.chart);
                            }
                        },
                        grid: { color: 'rgba(51,65,85,0.3)' }
                    },
                    y: {
                        position: 'right',
                        title: { display: true, text: 'תשואה %', color: '#94a3b8', font: { size: 13 } },
                        ticks: { color: '#94a3b8', font: { size: 12 }, callback: v => v.toFixed(1) + '%' },
                        grid: { color: 'rgba(51,65,85,0.3)' }
                    },
                    y1: {
                        position: 'left',
                        title: { display: true, text: 'שווי ($)', color: '#94a3b8', font: { size: 13 } },
                        ticks: { color: '#94a3b8', font: { size: 12 }, callback: v => '$' + (v/1000).toFixed(0) + 'K' },
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        rtl: true,
                        labels: { color: '#94a3b8', font: { size: 13 }, usePointStyle: true, padding: 20 }
                    },
                    tooltip: {
                        rtl: true,
                        titleFont: { size: 14 },
                        bodyFont: { size: 13 },
                        padding: 12,
                        callbacks: {
                            title: (items) => hist[items[0].dataIndex].date,
                            label: (ctx) => {
                                if (ctx.datasetIndex === 0) return ` תשואה: ${ctx.parsed.y.toFixed(2)}%`;
                                return ` שווי: $${ctx.parsed.y.toLocaleString()}`;
                            }
                        }
                    },
                    zoom: {
                        pan: {
                            enabled: true,
                            mode: 'x',
                            modifierKey: null
                        },
                        zoom: {
                            wheel: { enabled: true, speed: 0.1 },
                            pinch: { enabled: true },
                            drag: {
                                enabled: true,
                                backgroundColor: 'rgba(59,130,246,0.15)',
                                borderColor: '#3b82f6',
                                borderWidth: 1
                            },
                            mode: 'x'
                        }
                    }
                }
            }
        });
    }, 150);
}

function fullscreenZoom(action) {
    if (!fullscreenChartInstance) return;
    if (action === 'in') {
        fullscreenChartInstance.zoom(1.3);
    } else if (action === 'out') {
        fullscreenChartInstance.zoom(0.7);
    } else if (action === 'reset') {
        fullscreenChartInstance.resetZoom();
    }
}

function closeFullscreen(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('fullscreenOverlay').classList.remove('active');
    if (fullscreenChartInstance) {
        fullscreenChartInstance.destroy();
        fullscreenChartInstance = null;
    }
}

// ========== FILTERS ==========

function setFilter(type, value, btn) {
    activeFilters[type] = value;

    // Update button states
    document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    renderClientCards();
}

function searchClients(query) {
    activeFilters.search = query;
    renderClientCards();
}

// ========== REFRESH ==========

async function refreshAllPrices() {
    document.getElementById('lastUpdate').textContent = 'מעדכן...';
    await updatePricesForClients();
    renderSummaryBar();
    renderClientCards();
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
        `עודכן: ${now.toLocaleTimeString('he-IL')}`;
}

// ========== INIT ==========

async function init() {
    clients = generateClients();
    await updatePricesForClients();
    clients.forEach(c => generatePerformanceHistory(c));
    renderSummaryBar();
    renderClientCards();

    const now = new Date();
    document.getElementById('lastUpdate').textContent =
        `עודכן: ${now.toLocaleTimeString('he-IL')}`;

    document.getElementById('loadingOverlay').classList.add('hidden');

    // Auto-refresh every 60 seconds
    setInterval(refreshAllPrices, 60000);
}

// Handle ESC key for modal
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        if (document.getElementById('fullscreenOverlay').classList.contains('active')) {
            closeFullscreen();
            return;
        }
        document.getElementById('modalOverlay').classList.remove('active');
    }
});

init();
</script>
</body>
</html>
