                                <option value="high">גבוה (80% מניות / 20% אג"ח)</option>
                                <option value="medium">בינוני (50% מניות / 50% אג"ח)</option>
                                <option value="low" selected>נמוך (15% מניות / 85% אג"ח)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mgmt-footer">
                        <button class="mgmt-btn primary" onclick="addClient()">הוסף תיק</button>
                        <button class="mgmt-btn secondary" onclick="closeMgmtModal()">ביטול</button>
                    </div>`;
            }
            else if (action === 'editClient') {
                const c = data;
                html = `
                    <div class="mgmt-header"><h3>עריכת תיק - ${c.name}</h3><button class="modal-close" onclick="closeMgmtModal()">&times;</button></div>
                    <div class="mgmt-body">
                        <div class="mgmt-field"><label>שם הלקוח</label><input type="text" id="mgmt-name" value="${c.name}" /></div>
                        <div class="mgmt-field"><label>פרופיל סיכון</label>
                            <select id="mgmt-risk">
                                <option value="high" ${c.risk === 'high' ? 'selected' : ''}>גבוה (80% מניות / 20% אג"ח)</option>
                                <option value="medium" ${c.risk === 'medium' ? 'selected' : ''}>בינוני (50% מניות / 50% אג"ח)</option>
                                <option value="low" ${c.risk === 'low' ? 'selected' : ''}>נמוך (15% מניות / 85% אג"ח)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mgmt-footer">
                        <button class="mgmt-btn primary" onclick="editClient(${c.id})">שמור שינויים</button>
                        <button class="mgmt-btn secondary" onclick="closeMgmtModal()">ביטול</button>
                    </div>`;
            }
            else if (action === 'deleteClient') {
                const c = data;
                html = `
                    <div class="mgmt-header"><h3>מחיקת תיק</h3><button class="modal-close" onclick="closeMgmtModal()">&times;</button></div>
                    <div class="mgmt-body">
                        <div class="mgmt-confirm-text">האם אתה בטוח שברצונך למחוק את התיק של <strong>${c.name}</strong>?<br>פעולה זו אינה ניתנת לביטול.</div>
                    </div>
                    <div class="mgmt-footer">
                        <button class="mgmt-btn danger" onclick="deleteClient(${c.id})">מחק תיק</button>
                        <button class="mgmt-btn secondary" onclick="closeMgmtModal()">ביטול</button>
                    </div>`;
            }
            else if (action === 'addHolding') {
                const c = data;
                html = `
                    <div class="mgmt-header"><h3>הוספת נכס - ${c.name}</h3><button class="modal-close" onclick="closeMgmtModal()">&times;</button></div>
                    <div class="mgmt-body">
                        <div class="mgmt-field"><label>סוג נכס</label>
                            <select id="mgmt-asset-type" onchange="onAssetTypeChange()">
                                <option value="stock">מניה</option>
                                <option value="bond">אג"ח</option>
                            </select>
                        </div>
                        <div class="mgmt-field" id="mgmt-ticker-field"><label>סימול (Ticker)</label><input type="text" id="mgmt-ticker" placeholder="לדוגמה: AAPL" style="direction:ltr;text-align:left" /></div>
                        <div class="mgmt-field" id="mgmt-bondname-field" style="display:none"><label>שם האג"ח</label><input type="text" id="mgmt-bondname" placeholder='לדוגמה: אג"ח ממשלתי צמוד' /></div>
                        <div class="mgmt-field"><label>מחיר קנייה ($)</label><input type="number" id="mgmt-price" step="0.01" min="0" placeholder="0.00" style="direction:ltr;text-align:left" /></div>
                        <div class="mgmt-field"><label>כמות יחידות</label><input type="number" id="mgmt-qty" min="1" placeholder="0" style="direction:ltr;text-align:left" /></div>
                    </div>
                    <div class="mgmt-footer">
                        <button class="mgmt-btn primary" onclick="addHolding(${c.id})">הוסף נכס</button>
                        <button class="mgmt-btn secondary" onclick="closeMgmtModal()">ביטול</button>
                    </div>`;
            }
            else if (action === 'editHolding') {
                const { client: c, holdingIdx, holding: h } = data;
                const isStock = h.type === 'stock';
                html = `
                    <div class="mgmt-header"><h3>עריכת נכס - ${isStock ? h.ticker : h.name}</h3><button class="modal-close" onclick="closeMgmtModal()">&times;</button></div>
                    <div class="mgmt-body">
                        <div class="mgmt-field"><label>${isStock ? 'סימול (Ticker)' : 'שם האג"ח'}</label><input type="text" id="mgmt-edit-name" value="${isStock ? h.ticker : h.name}" ${isStock ? 'style="direction:ltr;text-align:left"' : ''} /></div>
                        <div class="mgmt-field"><label>מחיר קנייה ($)</label><input type="number" id="mgmt-edit-price" step="0.01" min="0" value="${h.shares > 0 ? (h.costBasis / h.shares).toFixed(2) : h.price.toFixed(2)}" style="direction:ltr;text-align:left" /></div>
                        <div class="mgmt-field"><label>כמות יחידות</label><input type="number" id="mgmt-edit-qty" min="1" value="${h.shares}" style="direction:ltr;text-align:left" /></div>
                    </div>
                    <div class="mgmt-footer">
                        <button class="mgmt-btn primary" onclick="editHolding(${c.id}, ${holdingIdx})">שמור שינויים</button>
                        <button class="mgmt-btn secondary" onclick="closeMgmtModal()">ביטול</button>
                    </div>`;
            }
            else if (action === 'removeHolding') {
                const { client: c, holdingIdx, holding: h } = data;
                const displayName = h.type === 'stock' ? h.ticker : h.name;
                html = `
                    <div class="mgmt-header"><h3>הסרת נכס</h3><button class="modal-close" onclick="closeMgmtModal()">&times;</button></div>
                    <div class="mgmt-body">
                        <div class="mgmt-confirm-text">האם אתה בטוח שברצונך להסיר את <strong>${displayName}</strong> מהתיק של <strong>${c.name}</strong>?</div>
                    </div>
                    <div class="mgmt-footer">
                        <button class="mgmt-btn danger" onclick="removeHolding(${c.id}, ${holdingIdx})">הסר נכס</button>
                        <button class="mgmt-btn secondary" onclick="closeMgmtModal()">ביטול</button>
                    </div>`;
            }

            box.innerHTML = html;
            document.getElementById('mgmtOverlay').classList.add('active');
        }

        function closeMgmtModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('mgmtOverlay').classList.remove('active');
        }

        function onAssetTypeChange() {
            const type = document.getElementById('mgmt-asset-type').value;
            document.getElementById('mgmt-ticker-field').style.display = type === 'stock' ? '' : 'none';
            document.getElementById('mgmt-bondname-field').style.display = type === 'bond' ? '' : 'none';
        }

        function recalcClient(client) {
            let totalValue = 0;
            client.holdings.forEach(h => {
                h.value = h.shares * h.price;
                totalValue += h.value;
            });
            if (totalValue > 0) {
                client.portfolioValue = totalValue;
                client.holdings.forEach(h => {
                    h.allocationPct = (h.value / totalValue * 100);
                });
                client.stockPct = client.holdings.filter(h => h.type === 'stock').reduce((s, h) => s + h.allocationPct, 0);
                client.bondPct = client.holdings.filter(h => h.type === 'bond').reduce((s, h) => s + h.allocationPct, 0);
            } else {
                client.portfolioValue = 0;
                client.stockPct = 0;
                client.bondPct = 0;
            }
            client.initialInvestment = client.holdings.reduce((s, h) => s + h.costBasis, 0);
            generatePerformanceHistory(client);
        }

        function refreshDashboard() {
            renderSummaryBar();
            renderExposureSection();
            renderClientCards();
        }

        // --- Client CRUD ---

        function addClient() {
            const name = document.getElementById('mgmt-name').value.trim();
            const risk = document.getElementById('mgmt-risk').value;
            if (!name) { alert('נא להזין שם לקוח'); return; }

            const riskLabels = { high: 'גבוה', medium: 'בינוני', low: 'נמוך' };
            const riskStockPct = { high: 80, medium: 50, low: 15 };
            const riskBondPct = { high: 20, medium: 50, low: 85 };

            const maxId = clients.length > 0 ? Math.max(...clients.map(c => c.id)) : 0;
            const newClient = {
                id: maxId + 1,
                name,
                risk,
                riskLabel: riskLabels[risk],
                stockPct: riskStockPct[risk],
                bondPct: riskBondPct[risk],
                portfolioValue: 0,
                initialInvestment: 0,
                holdings: [],
                performanceHistory: []
            };

            clients.push(newClient);
            generatePerformanceHistory(newClient);
            closeMgmtModal();
            refreshDashboard();
        }

        function editClient(clientId) {
            const client = clients.find(c => c.id === clientId);
            if (!client) return;

            const name = document.getElementById('mgmt-name').value.trim();
            const risk = document.getElementById('mgmt-risk').value;
            if (!name) { alert('נא להזין שם לקוח'); return; }

            const riskLabels = { high: 'גבוה', medium: 'בינוני', low: 'נמוך' };
            client.name = name;
            client.risk = risk;
            client.riskLabel = riskLabels[risk];

            generatePerformanceHistory(client);
            closeMgmtModal();
            refreshDashboard();
            // Reopen modal if it was open
            if (currentModalClientId === clientId) {
                openModal(clientId);
            }
        }

        function deleteClient(clientId) {
            clients = clients.filter(c => c.id !== clientId);
            closeMgmtModal();
            // Close the client modal if it was open
            if (currentModalClientId === clientId) {
                document.getElementById('modalOverlay').classList.remove('active');
                currentModalClientId = null;
            }
            refreshDashboard();
        }

        // --- Holding CRUD ---

        async function addHolding(clientId) {
            const client = clients.find(c => c.id === clientId);
            if (!client) return;

            const type = document.getElementById('mgmt-asset-type').value;
            const price = parseFloat(document.getElementById('mgmt-price').value);
            const qty = parseInt(document.getElementById('mgmt-qty').value);

            if (!price || price <= 0) { alert('נא להזין מחיר קנייה תקין'); return; }
            if (!qty || qty <= 0) { alert('נא להזין כמות תקינה'); return; }

            let ticker, name, sector, currency, currentPrice, previousClose;

            if (type === 'stock') {
                ticker = (document.getElementById('mgmt-ticker').value || '').toUpperCase().trim();
                if (!ticker) { alert('נא להזין סימול מניה'); return; }
                name = ticker;
                sector = SECTOR_MAP[ticker] || 'Other';
                currency = 'USD';
                // Try to get real price
                if (priceCache[ticker]) {
                    currentPrice = priceCache[ticker].price;
                    previousClose = priceCache[ticker].previousClose;
                } else {
                    const fetched = await fetchStockPrice(ticker);
                    if (fetched) {
                        currentPrice = fetched.price;
                        previousClose = fetched.previousClose;
                        priceCache[ticker] = fetched;
                    } else {
                        const sim = generateSimulatedPrice(ticker);
                        currentPrice = sim.price;
                        previousClose = sim.previousClose;
                        priceCache[ticker] = sim;
                    }
                }
            } else {
                name = (document.getElementById('mgmt-bondname').value || '').trim();
                if (!name) { alert('נא להזין שם אג"ח'); return; }
                ticker = 'BOND_' + Date.now();
                sector = undefined;
                currency = 'ILS';
                currentPrice = price;
                previousClose = price * (1 + (Math.random() - 0.5) * 0.003);
            }

            const costBasis = price * qty;
            const value = currentPrice * qty;

            client.holdings.push({
                ticker,
                name,
                type,
                typeLabel: type === 'stock' ? 'מניה' : 'אג"ח',
                sector,
                allocationPct: 0,
                value,
                costBasis,
                shares: qty,
                price: currentPrice,
                previousClose,
                currency
            });

            recalcClient(client);
            closeMgmtModal();
            refreshDashboard();
            if (currentModalClientId === clientId) {
                openModal(clientId);
            }
        }

        function editHolding(clientId, holdingIdx) {
            const client = clients.find(c => c.id === clientId);
            if (!client || !client.holdings[holdingIdx]) return;

            const h = client.holdings[holdingIdx];
            const newName = document.getElementById('mgmt-edit-name').value.trim();
            const newPrice = parseFloat(document.getElementById('mgmt-edit-price').value);
            const newQty = parseInt(document.getElementById('mgmt-edit-qty').value);

            if (!newName) { alert('נא להזין שם/סימול'); return; }
            if (!newPrice || newPrice <= 0) { alert('נא להזין מחיר תקין'); return; }
            if (!newQty || newQty <= 0) { alert('נא להזין כמות תקינה'); return; }

            if (h.type === 'stock') {
                h.ticker = newName.toUpperCase();
                h.name = h.ticker;
                h.sector = SECTOR_MAP[h.ticker] || 'Other';
            } else {
                h.name = newName;
            }

            h.costBasis = newPrice * newQty;
            h.shares = newQty;
            h.value = h.price * newQty;

            recalcClient(client);
            closeMgmtModal();
            refreshDashboard();
            if (currentModalClientId === clientId) {
                openModal(clientId);
            }
        }

        function removeHolding(clientId, holdingIdx) {
            const client = clients.find(c => c.id === clientId);
            if (!client) return;

            client.holdings.splice(holdingIdx, 1);
            recalcClient(client);
            closeMgmtModal();
            refreshDashboard();
            if (currentModalClientId === clientId) {
                openModal(clientId);
            }
        }

        // ========== REFRESH ==========

        async function refreshAllPrices() {
            document.getElementById('lastUpdate').textContent = 'מעדכן...';
            await updatePricesForClients();
            renderSummaryBar();
            renderExposureSection();
            renderClientCards();
            await checkAlerts();
            renderAlerts();
            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                `עודכן: ${now.toLocaleTimeString('he-IL')}`;
        }

        // ========== INIT ==========

        async function init() {
            clients = generateClients();
            await updatePricesForClients();
            clients.forEach(c => generatePerformanceHistory(c));
            renderSummaryBar();
            renderExposureSection();
            renderClientCards();
            await checkAlerts();
            renderAlerts();

            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                `עודכן: ${now.toLocaleTimeString('he-IL')}`;

            document.getElementById('loadingOverlay').classList.add('hidden');

            // Auto-refresh every 60 seconds
            setInterval(refreshAllPrices, 60000);
        }

        // Handle ESC key for modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('fullscreenOverlay').classList.contains('active')) {
                    closeFullscreen();
                    return;
                }
                document.getElementById('modalOverlay').classList.remove('active');
            }
        });

        init();
    </script>
</body>

</html>
