<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Portfolio Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #263348;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-orange: #f97316;
            --accent-yellow: #eab308;
            --accent-purple: #a855f7;
            --risk-high: #ef4444;
            --risk-medium: #f97316;
            --risk-low: #22c55e;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --color-profit: #22c55e;
            --color-loss: #ef4444;
            --color-neutral: #3b82f6;
            --color-bonds: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 90%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            direction: rtl;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), #0f1d32);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* Summary Bar */
        .summary-bar {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .summary-main {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 12px;
        }

        .summary-card-large {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .summary-card-large .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .summary-card-large .value {
            font-size: 26px;
            font-weight: 800;
            line-height: 1.2;
        }

        .summary-card-large .sub {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .summary-secondary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .summary-card {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            border: 1px solid var(--border);
        }

        .summary-card .label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .summary-card .value {
            font-size: 16px;
            font-weight: 700;
        }

        .summary-card .sub {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            padding: 14px 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .filter-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .search-input {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 11px;
            font-family: inherit;
            width: 200px;
            direction: rtl;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .sort-select {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 11px;
            font-family: inherit;
            direction: rtl;
            cursor: pointer;
        }

        .sort-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .filter-separator {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        /* Exposure Section */
        .exposure-section {
            padding: 14px 24px;
        }

        .exposure-section h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text-primary);
        }

        .exposure-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .exposure-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            padding: 20px;
        }

        .exposure-card h3 {
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .exposure-bar {
            display: flex;
            height: 34px;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 12px;
            width: 100%;

        }

        .exposure-bar-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            min-width: 40px;
            transition: width 0.5s;
        }

        .exposure-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .exposure-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .exposure-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .sector-chart-container {
            height: 280px;
        }

        /* Grid */
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
            padding: 0 24px 24px;
            align-items: stretch;
        }

        /* Client Card */
        .client-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .client-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card-header {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .client-name {
            font-size: 14px;
            font-weight: 700;
        }

        .risk-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-badge.high {
            background: rgba(239, 68, 68, 0.15);
            color: var(--risk-high);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .risk-badge.medium {
            background: rgba(249, 115, 22, 0.15);
            color: var(--risk-medium);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .risk-badge.low {
            background: rgba(34, 197, 94, 0.15);
            color: var(--risk-low);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .card-body {
            padding: 14px 16px;
            display: flex;
            gap: 16px;
        }

        .chart-container {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }

        .card-performance {
            padding: 0 16px 8px;
            border-bottom: 1px solid var(--border);
        }

        .time-range-toggle {
            display: flex;
            gap: 4px;
            padding: 6px 16px 0;
        }

        .time-range-btn {
            padding: 3px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .time-range-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .time-range-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .card-performance-chart {
            width: 100%;
            height: 75px;
        }

        .holdings-summary {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .allocation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            font-size: 11px;
        }

        .allocation-row:last-child {
            border-bottom: none;
        }

        .allocation-label {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .allocation-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .allocation-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-footer {
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            margin-top: auto;
        }

        .portfolio-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .portfolio-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
            overflow-x: auto;
        }

        .modal-tab {
            padding: 12px 20px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: inherit;
            white-space: nowrap;
        }

        .modal-tab:hover {
            color: var(--text-primary);
        }

        .modal-tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .modal-tab-content {
            display: none;
        }

        .modal-tab-content.active {
            display: block;
        }

        .benchmark-legend {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .benchmark-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .benchmark-line {
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        .sector-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 16px;
        }

        .sector-table th {
            text-align: right;
            padding: 8px 12px;
            background: var(--bg-primary);
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .sector-table td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
            color: var(--text-secondary);
        }

        .transaction-badge {
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
        }

        .transaction-badge.buy {
            background: rgba(34, 197, 94, 0.15);
            color: var(--color-profit);
        }

        .transaction-badge.sell {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-loss);
        }

        .modal-chart-container {
            width: 250px;
            height: 250px;
            margin: 0 auto 24px;
        }

        .modal-performance-container {
            width: 100%;
            height: 280px;
            margin-bottom: 24px;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .modal-performance-container h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .modal-charts-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .modal-charts-row>div {
            flex: 1;
        }

        @media (max-width: 768px) {
            .modal-charts-row {
                flex-direction: column;
            }
        }

        /* Fullscreen Chart Overlay */
        .fullscreen-chart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 30px;
        }

        .fullscreen-chart-overlay.active {
            display: flex;
        }

        .fullscreen-chart-box {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .fullscreen-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .fullscreen-chart-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .fullscreen-chart-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: inherit;
        }

        .zoom-btn:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .zoom-btn.reset {
            width: auto;
            padding: 0 12px;
            font-size: 12px;
        }

        .fullscreen-chart-body {
            flex: 1;
            padding: 20px;
            position: relative;
        }

        .expand-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 5;
        }

        .expand-btn:hover {
            background: var(--accent-blue);
            color: white;
        }

        .chart-wrapper-relative {
            position: relative;
        }

        .zoom-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            padding: 6px 0 0;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .modal-stat {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .modal-stat .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .modal-stat .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .holdings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .holdings-table th {
            text-align: right;
            padding: 10px 12px;
            background: var(--bg-primary);
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .holdings-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
            color: var(--text-secondary);
        }

        .holdings-table tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }

        .asset-type-badge {
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
        }

        .asset-type-badge.stock {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }

        .asset-type-badge.bond {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
        }

        .price-change.positive {
            color: var(--accent-green);
        }

        .price-change.negative {
            color: var(--accent-red);
        }

        /* Macro News Page */
        .macro-page {
            display: none;
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 0;
        }

        .macro-page.active {
            display: block;
        }

        .macro-page-header {
            background: linear-gradient(135deg, var(--bg-secondary), #0f1d32);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .macro-page-header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .macro-back-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .macro-back-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .macro-content {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .macro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .macro-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 24px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .macro-card:hover {
            transform: translateY(-2px);
        }

        /* Unread - red border and glow */
        .macro-card.macro-unread {
            border-color: rgba(239, 68, 68, 0.6);
            background: rgba(239, 68, 68, 0.06);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.15);
        }

        .macro-card.macro-unread:hover {
            border-color: rgba(239, 68, 68, 0.8);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        /* Read - blue border */
        .macro-card.macro-read {
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.03);
        }

        .macro-card.macro-read:hover {
            border-color: rgba(59, 130, 246, 0.6);
        }

        .macro-new-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            margin-right: 6px;
            vertical-align: middle;
        }

        .macro-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .macro-card-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .macro-card-category {
            font-size: 12px;
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        .macro-card-data {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .macro-data-item {
            text-align: center;
            padding: 10px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
        }

        .macro-data-item .data-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .macro-data-item .data-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .macro-card-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .alert-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            margin-right: 4px;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .clients-grid {
                grid-template-columns: 1fr;
                padding: 0 16px 16px;
            }

            .header {
                padding: 16px;
            }

            .summary-bar {
                padding: 16px;
            }

            .summary-main {
                grid-template-columns: repeat(2, 1fr);
            }

            .summary-secondary {
                grid-template-columns: 1fr;
            }

            .filters {
                padding: 16px;
            }

            .exposure-grid {
                grid-template-columns: 1fr;
            }

            .card-body {
                flex-direction: column;
                align-items: center;
            }

            .modal-stats {
                grid-template-columns: 1fr;
            }
        }

        /* Report */
        .report-view {
            display: none;
            padding: 40px;
            background: white;
            color: #1a1a1a;
            max-width: 800px;
            margin: 0 auto;
            direction: rtl;
        }

        .report-view.active {
            display: block;
        }

        .report-header {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .report-header h1 {
            font-size: 24px;
            color: #1a1a1a;
            background: none;
            -webkit-text-fill-color: #1a1a1a;
        }

        .report-header p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .report-section {
            margin-bottom: 30px;
            page-break-inside: avoid;
        }

        .report-section h3 {
            font-size: 16px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 16px;
            color: #333;
        }

        .report-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .report-stat {
            text-align: center;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .report-stat .label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .report-stat .value {
            font-size: 18px;
            font-weight: 700;
        }

        .report-chart-img {
            width: 100%;
            max-height: 300px;
            margin: 16px 0;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .report-table th,
        .report-table td {
            padding: 8px 10px;
            border: 1px solid #ddd;
            text-align: right;
        }

        .report-table th {
            background: #f5f5f5;
            font-weight: 700;
        }

        .report-back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            z-index: 9999;
        }

        @media print {
            body {
                background: white !important;
            }

            .header,
            .filters,
            .clients-grid,
            .exposure-section,
            .modal-overlay,
            .fullscreen-chart-overlay,
            .macro-page,
            .loading-overlay,
            .summary-bar,
            .report-back-btn {
                display: none !important;
            }

            .report-view {
                display: block !important;
                padding: 20px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Management Modal */
        .mgmt-overlay {

            color: var(--text-secondary);

            font-weight: 600;
        }
        .mgmt-field input, .mgmt-field select {
            width: 100%;

            border-radius: var(--radius-sm);

            font-size: 13px;
            font-family: inherit;
            direction: rtl;
        }
        .mgmt-field input:focus, .mgmt-field select:focus {

        }
        .mgmt-btn {

            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .mgmt-btn.primary { background: var(--accent-blue); color: white; }

        .mgmt-btn.danger { background: var(--accent-red); color: white; }

        .mgmt-btn.secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }

        /* Card action buttons */
        .card-actions {
            display: flex;

        }
        .card-action-btn {

            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);

            cursor: pointer;
            display: flex;
            align-items: center;

    </header>

    <div class="macro-page" id="macroPage"></div>

    <div class="summary-bar" id="summaryBar"></div>

    <div class="filters">

            <button class="filter-btn" data-filter="asset" data-value="bonds"
                onclick="setFilter('asset', 'bonds', this)">אג"ח</button>
        </div>
        <div class="filter-separator"></div>
        <div class="filter-group">
            <label>סקטור:</label>

        </div>
        <div class="filter-separator"></div>
        <div class="filter-group">
            <label>גודל תיק:</label>
            <button class="filter-btn active" data-filter="size" data-value="all"

        };

        // Read/unread state stored in localStorage
        let readAlertIds = JSON.parse(localStorage.getItem('readMacroAlerts') || '[]');

        const BONDS = [
            { id: 'IL_CPI_1', name: 'אג"ח ממשלתי צמוד 0523', type: 'il_cpi', basePrice: 112.5 },

        // Price cache

        // ========== UTILITY ==========

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function pickRandom(arr, n) {
            return shuffle(arr).slice(0, n);
        }

        function formatCurrency(val, currency = 'USD') {
            if (currency === 'ILS') {
                return val.toLocaleString('he-IL', { style: 'currency', currency: 'ILS', maximumFractionDigits: 0 });
            }
            return val.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
        }

        function formatNumber(val) {
            return val.toLocaleString('he-IL', { maximumFractionDigits: 2 });
        }

        // ========== PRICE FETCHING ==========

        function fetchWithTimeout(url, timeoutMs = 3000) {
            return Promise.race([
                fetch(url),
                new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeoutMs))
            ]);
        }

        async function fetchStockPrice(ticker) {
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
                const response = await fetchWithTimeout(url, 3000);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                const meta = data.chart.result[0].meta;
                return {
                    price: meta.regularMarketPrice,
                    previousClose: meta.previousClose || meta.chartPreviousClose,
                    currency: meta.currency
                };
            } catch (e) {
                return null;
            }
        }

        function generateSimulatedPrice(ticker, baseMin = 20, baseMax = 500) {
            // Deterministic base from ticker, with random daily variation
            let hash = 0;
            for (let i = 0; i < ticker.length; i++) hash = ((hash << 5) - hash) + ticker.charCodeAt(i);
            const base = baseMin + (Math.abs(hash) % (baseMax - baseMin));
            const variation = (Math.random() - 0.5) * base * 0.04;
            const price = base + variation;
            const previousClose = price - (Math.random() - 0.5) * price * 0.03;
            return { price: Math.round(price * 100) / 100, previousClose: Math.round(previousClose * 100) / 100, currency: 'USD' };
        }

        async function fetchAllPrices(tickers) {
            const uniqueTickers = [...new Set(tickers)];
            const results = {};

            // Quick test: can we reach Yahoo Finance at all? (3 second timeout)
            let apiAvailable = false;
            try {
                const testResponse = await fetchWithTimeout(
                    `https://query1.finance.yahoo.com/v8/finance/chart/AAPL?interval=1d&range=1d`, 3000
                );
                if (testResponse.ok) {
                    apiAvailable = true;
                    const data = await testResponse.json();
                    const meta = data.chart.result[0].meta;
                    results['AAPL'] = {
                        price: meta.regularMarketPrice,
                        previousClose: meta.previousClose || meta.chartPreviousClose,
                        currency: meta.currency
                    };
                }
            } catch (e) { }

            if (apiAvailable) {
                // Fetch remaining tickers in parallel batches
                const remaining = uniqueTickers.filter(t => t !== 'AAPL');
                const batchSize = 10;
                for (let i = 0; i < remaining.length; i += batchSize) {
                    const batch = remaining.slice(i, i + batchSize);
                    const promises = batch.map(async (ticker) => {
                        const result = await fetchStockPrice(ticker);
                        if (result) results[ticker] = result;
                    });
                    await Promise.all(promises);
                }
            }

            // Fill any missing tickers with simulated prices
            for (const t of uniqueTickers) {
                if (!results[t]) results[t] = generateSimulatedPrice(t);
            }
            return results;
        }

        // ========== CLIENT GENERATION ==========

        function generateClients() {
            const names = shuffle(ISRAELI_NAMES);
            const clients = [];

            const riskProfiles = [
                ...Array(5).fill({ risk: 'high', stockPct: 80, bondPct: 20, label: 'גבוה' }),
                ...Array(5).fill({ risk: 'medium', stockPct: 50, bondPct: 50, label: 'בינוני' }),
                ...Array(10).fill({ risk: 'low', stockPct: 15, bondPct: 85, label: 'נמוך' }),
            ];

            for (let i = 0; i < 20; i++) {
                const profile = riskProfiles[i];
                const portfolioValue = 100000 + Math.floor(Math.random() * 900000); // 100K-1M

                // Pick random stocks (3-6 per client)
                const numStocks = 3 + Math.floor(Math.random() * 4);
                const selectedStocks = pickRandom(ALL_TICKERS, numStocks);

                // Pick random bonds (2-3 per client)
                const numBonds = 2 + Math.floor(Math.random() * 2);
                const selectedBonds = pickRandom(BONDS, numBonds);

                // Calculate stock allocations
                const stockTotal = profile.stockPct;
                const stockAllocations = distributePercentage(stockTotal, numStocks);

                // Calculate bond allocations
                const bondTotal = profile.bondPct;
                const bondAllocations = distributePercentage(bondTotal, numBonds);

                const holdings = [];

                selectedStocks.forEach((ticker, j) => {
                    const allocValue = portfolioValue * stockAllocations[j] / 100;
                    // Cost basis: simulate buying at a price -15% to +10% from current
                    const costVariation = 1 + (Math.random() * 0.25 - 0.15);
                    holdings.push({
                        ticker,
                        name: ticker,
                        type: 'stock',
                        typeLabel: 'מניה',
                        sector: SECTOR_MAP[ticker] || 'Other',
                        allocationPct: stockAllocations[j],
                        value: allocValue,
                        costBasis: allocValue / costVariation,
                        shares: 0,
                        price: 0,
                        previousClose: 0,
                        currency: 'USD'
                    });
                });

                selectedBonds.forEach((bond, j) => {
                    const allocValue = portfolioValue * bondAllocations[j] / 100;
                    const costVariation = 1 + (Math.random() * 0.08 - 0.03);
                    holdings.push({
                        ticker: bond.ticker || bond.id,
                        name: bond.name,
                        type: 'bond',
                        typeLabel: 'אג"ח',
                        allocationPct: bondAllocations[j],
                        value: allocValue,
                        costBasis: allocValue / costVariation,
                        shares: 0,
                        price: bond.basePrice,
                        previousClose: bond.basePrice * (1 + (Math.random() - 0.5) * 0.01),
                        currency: bond.type === 'il_cpi' ? 'ILS' : 'USD'
                    });
                });

                const initialInvestment = holdings.reduce((s, h) => s + h.costBasis, 0);

                clients.push({
                    id: i + 1,
                    name: names[i],
                    risk: profile.risk,
                    riskLabel: profile.label,
                    stockPct: profile.stockPct,
                    bondPct: profile.bondPct,
                    portfolioValue,
                    initialInvestment,
                    holdings
                });
            }

            return clients;
        }

        function distributePercentage(total, count) {
            const parts = [];
            let remaining = total;
            for (let i = 0; i < count - 1; i++) {
                const min = Math.max(1, Math.floor(remaining / (count - i) * 0.4));
                const max = Math.floor(remaining / (count - i) * 1.6);
                const part = min + Math.floor(Math.random() * (max - min + 1));
                const clamped = Math.min(part, remaining - (count - i - 1));
                parts.push(clamped);
                remaining -= clamped;
            }
            parts.push(remaining);
            return parts;
        }

        // ========== PERFORMANCE HISTORY ==========

        function generatePerformanceHistory(client) {
            const history = [];
            let value = client.initialInvestment;
            const today = new Date();
            const startDate = new Date(2019, 0, 1); // January 1, 2019

            // Calculate total days from start to today
            const totalDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));

            // Volatility based on risk profile
            const volatility = { high: 0.014, medium: 0.009, low: 0.004 };
            const drift = { high: 0.0003, medium: 0.00025, low: 0.00015 };
            const vol = volatility[client.risk];
            const d = drift[client.risk];

            // Sample weekly to keep data manageable (~300+ points)
            for (let i = 0; i <= totalDays; i += 5) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                // Skip weekends
                if (date.getDay() === 0 || date.getDay() === 6) continue;

                // Add some market events (COVID crash, recovery, etc.)
                let eventMultiplier = 1;
                const y = date.getFullYear();
                const m = date.getMonth();
                if (y === 2020 && m >= 1 && m <= 3) eventMultiplier = 0.97; // COVID crash
                if (y === 2020 && m >= 4 && m <= 8) eventMultiplier = 1.02; // Recovery
                if (y === 2022 && m >= 0 && m <= 9) eventMultiplier = 0.995; // Bear market

                const dailyReturn = (d + vol * (Math.random() * 2 - 1)) * eventMultiplier;
                value = value * (1 + dailyReturn);

                history.push({
                    date: date.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' }),
                    monthLabel: date.toLocaleDateString('he-IL', { month: 'short', year: '2-digit' }),
                    yearLabel: date.getFullYear().toString(),
                    month: date.getMonth(),
                    year: date.getFullYear(),
                    value: Math.round(value),
                    returnPct: ((value - client.initialInvestment) / client.initialInvestment * 100)
                });
            }

            // Make the last point match current portfolio value
            if (history.length > 0) {
                history[history.length - 1].value = Math.round(client.portfolioValue);
                history[history.length - 1].returnPct = ((client.portfolioValue - client.initialInvestment) / client.initialInvestment * 100);
            }

            client.performanceHistory = history;
        }

        // ========== SMART LABELS (zoom-aware) ==========

        function getSmartLabel(hist, index, chart) {
            // Determine visible range
            const xScale = chart.scales.x;
            const minIndex = Math.max(0, Math.floor(xScale.min || 0));
            const maxIndex = Math.min(hist.length - 1, Math.ceil(xScale.max || hist.length - 1));
            const visibleCount = maxIndex - minIndex + 1;

            const point = hist[index];
            if (!point) return null;

            // Calculate how many years are visible
            const startYear = hist[minIndex] ? hist[minIndex].year : point.year;
            const endYear = hist[maxIndex] ? hist[maxIndex].year : point.year;
            const yearSpan = endYear - startYear;

            if (yearSpan > 1 || visibleCount > 150) {
                // Zoomed out: show years - only at first occurrence of each year
                if (index === 0 || point.year !== hist[index - 1].year) {
                    return point.yearLabel;
                }
                return null;
            } else {
                // Zoomed in: show months - only at first occurrence of each month
                if (index === 0 || point.month !== hist[index - 1].month || point.year !== hist[index - 1].year) {
                    return point.monthLabel;
                }
                return null;
            }
        }

        // ========== UPDATE PRICES ==========

        async function updatePricesForClients() {
            // Collect all stock tickers
            const allStockTickers = [];
            const bondTickers = [];
            clients.forEach(c => {
                c.holdings.forEach(h => {
                    if (h.type === 'stock') allStockTickers.push(h.ticker);
                    else if (h.type === 'bond' && h.ticker && !h.ticker.startsWith('IL_')) {
                        bondTickers.push(h.ticker);
                    }
                });
            });

            const allTickers = [...new Set([...allStockTickers, ...bondTickers])];
            priceCache = await fetchAllPrices(allTickers);

            // Update holdings with real prices
            clients.forEach(c => {
                let totalValue = 0;
                c.holdings.forEach(h => {
                    if (priceCache[h.ticker]) {
                        h.price = priceCache[h.ticker].price;
                        h.previousClose = priceCache[h.ticker].previousClose;
                        h.currency = priceCache[h.ticker].currency || h.currency;
                    } else if (h.type === 'bond' && h.ticker.startsWith('IL_')) {
                        // Israeli bonds - simulate small daily change
                        h.price = h.price * (1 + (Math.random() - 0.5) * 0.005);
                        h.previousClose = h.price * (1 + (Math.random() - 0.5) * 0.003);
                    }
                    h.shares = h.price > 0 ? Math.floor(h.value / h.price) : 0;
                    h.value = h.shares * h.price;
                    totalValue += h.value;
                });
                // Recalculate percentages based on actual values
                if (totalValue > 0) {
                    c.portfolioValue = totalValue;
                    c.holdings.forEach(h => {
                        h.allocationPct = (h.value / totalValue * 100);
                    });
                    c.stockPct = c.holdings.filter(h => h.type === 'stock').reduce((sum, h) => sum + h.allocationPct, 0);
                    c.bondPct = c.holdings.filter(h => h.type === 'bond').reduce((sum, h) => sum + h.allocationPct, 0);
                }
            });
        }

        // ========== EXPOSURE ==========

        function calculateOverallExposure() {
            let totalStocks = 0, totalBonds = 0, totalValue = 0;
            const sectorTotals = {};
            clients.forEach(c => {
                c.holdings.forEach(h => {
                    totalValue += h.value;
                    if (h.type === 'stock') {
                        totalStocks += h.value;
                        const sector = h.sector || SECTOR_MAP[h.ticker] || 'Other';
                        sectorTotals[sector] = (sectorTotals[sector] || 0) + h.value;
                    } else {
                        totalBonds += h.value;
                    }
                });
            });
            return { totalStocks, totalBonds, totalValue, sectorTotals };
        }

                            tooltip: { rtl: true, titleFont: { size: 14 }, bodyFont: { size: 13 }, callbacks: { label: (ctx) => ` ${ctx.label}: ${(ctx.parsed / exp.totalValue * 100).toFixed(1)}% (${formatCurrency(ctx.parsed)})` } }

        // ========== RENDERING ==========

        function renderSummaryBar() {
            const totalAUM = clients.reduce((sum, c) => sum + c.portfolioValue, 0);
            const totalInvested = clients.reduce((sum, c) => sum + c.initialInvestment, 0);
            const totalProfit = totalAUM - totalInvested;
            const totalReturn = totalInvested > 0 ? (totalProfit / totalInvested * 100) : 0;
            const profitClass = totalProfit >= 0 ? 'positive' : 'negative';
            const profitSign = totalProfit >= 0 ? '+' : '';

            const highClients = clients.filter(c => c.risk === 'high');
            const medClients = clients.filter(c => c.risk === 'medium');
            const lowClients = clients.filter(c => c.risk === 'low');

            // Weighted average return
            const avgReturn = totalInvested > 0 ? clients.reduce((s, c) => {
                const r = c.initialInvestment > 0 ? ((c.portfolioValue - c.initialInvestment) / c.initialInvestment * 100) : 0;
                return s + r * (c.initialInvestment / totalInvested);
            }, 0) : 0;
            const avgClass = avgReturn >= 0 ? 'positive' : 'negative';
            const avgSign = avgReturn >= 0 ? '+' : '';

            function groupReturn(group) {
                const inv = group.reduce((s, c) => s + c.initialInvestment, 0);
                const val = group.reduce((s, c) => s + c.portfolioValue, 0);
                const ret = inv > 0 ? ((val - inv) / inv * 100) : 0;
                const cls = ret >= 0 ? 'positive' : 'negative';
                const sgn = ret >= 0 ? '+' : '';
                return `<span class="price-change ${cls}">${sgn}${ret.toFixed(2)}%</span>`;

            document.getElementById('summaryBar').innerHTML = `

        function renderClientCards() {
            const grid = document.getElementById('clientsGrid');
            grid.innerHTML = '';

            // Destroy existing charts
            Object.values(charts).forEach(c => c.destroy());
            charts = {};

            let filtered = clients.filter(c => {
                if (activeFilters.risk !== 'all' && c.risk !== activeFilters.risk) return false;
                if (activeFilters.sector !== 'all') {
                    const hasSector = c.holdings.some(h => h.sector === activeFilters.sector);
                    if (!hasSector) return false;
                }
                if (activeFilters.search) {
                    const q = activeFilters.search.toLowerCase();
                    const nameMatch = c.name.toLowerCase().includes(q);
                    const tickerMatch = c.holdings.some(h => h.ticker.toLowerCase().includes(q) || h.name.toLowerCase().includes(q));
                    if (!nameMatch && !tickerMatch) return false;
                }
                if (activeFilters.sizeMin !== null && c.portfolioValue < activeFilters.sizeMin) return false;
                if (activeFilters.sizeMax !== null && c.portfolioValue > activeFilters.sizeMax) return false;
                const returnPct = c.initialInvestment > 0 ? ((c.portfolioValue - c.initialInvestment) / c.initialInvestment * 100) : 0;
                if (activeFilters.returnMin !== null && returnPct < activeFilters.returnMin) return false;
                if (activeFilters.returnMax !== null && returnPct > activeFilters.returnMax) return false;
                return true;
            });

            // Sorting

        function generateSP500Benchmark(client) {
            if (!client.performanceHistory || !client.performanceHistory.length) return [];
            const hist = client.performanceHistory;
            let value = 100; // Normalized to 100
            const benchmark = [];
            const drift = 0.00035;
            const vol = 0.01;
            for (let i = 0; i < hist.length; i++) {
                let eventMul = 1;
                const y = hist[i].year, m = hist[i].month;
                if (y === 2020 && m >= 1 && m <= 3) eventMul = 0.97;
                if (y === 2020 && m >= 4 && m <= 8) eventMul = 1.02;
                if (y === 2022 && m >= 0 && m <= 9) eventMul = 0.995;
                const ret = (drift + vol * (Math.random() * 2 - 1)) * eventMul;
                value = value * (1 + ret);
                benchmark.push({ returnPct: (value - 100) });
            }
            return benchmark;
        }

        function generateTransactionHistory(client) {
            const transactions = [];
            const now = new Date();
            client.holdings.forEach(h => {
                // Initial buy
                const buyDate = new Date(now.getFullYear() - 2 + Math.floor(Math.random() * 2), Math.floor(Math.random() * 12), 1 + Math.floor(Math.random() * 28));
                const buyPrice = h.costBasis / (h.shares || 1);
                transactions.push({ date: buyDate, type: 'buy', ticker: h.type === 'stock' ? h.ticker : h.name.slice(0, 20), shares: h.shares, price: buyPrice, total: h.costBasis, assetType: h.type });
                // Some random additional buys
                if (Math.random() > 0.5) {
                    const addDate = new Date(buyDate.getTime() + Math.floor(Math.random() * 180) * 86400000);
                    const addShares = Math.max(1, Math.floor(h.shares * 0.3));
                    const addPrice = buyPrice * (1 + (Math.random() - 0.5) * 0.1);
                    transactions.push({ date: addDate, type: 'buy', ticker: h.type === 'stock' ? h.ticker : h.name.slice(0, 20), shares: addShares, price: addPrice, total: addShares * addPrice, assetType: h.type });
                }
            });
            transactions.sort((a, b) => b.date - a.date);
            return transactions;
        }

        // ========== TIME RANGE ==========

        function filterHistoryByRange(history, range) {
            if (range === 'all' || !history.length) return history;
            const now = new Date();
            let cutoff;
            if (range === '1m') cutoff = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
            else if (range === '3m') cutoff = new Date(now.getFullYear(), now.getMonth() - 3, now.getDate());
            else if (range === '1y') cutoff = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
            else return history;

            // Performance history dates are in he-IL format DD.MM.YYYY - parse them
            return history.filter(p => {
                const parts = p.date.split('.');
                if (parts.length === 3) {
                    const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
                    return d >= cutoff;
                }
                return true;
            });
        }

            if (!client || !client.performanceHistory) return;

            btn.parentElement.querySelectorAll('.time-range-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const hist = filterHistoryByRange(client.performanceHistory, range);
            if (!hist.length) return;

            if (charts[`perf-${clientId}`]) { charts[`perf-${clientId}`].destroy(); delete charts[`perf-${clientId}`]; }

            const perfCtx = document.getElementById(`perf-${clientId}`);
            if (!perfCtx) return;

            const isPositive = hist[hist.length - 1].returnPct >= 0;
            const lineColor = isPositive ? COLORS.profit : COLORS.loss;

        // ========== REPORTS ==========

        function generateReport(clientId) {
            const client = clients.find(c => c.id === clientId);
            if (!client) return;

            const totalProfit = client.portfolioValue - client.initialInvestment;
            const totalReturn = client.initialInvestment > 0 ? (totalProfit / client.initialInvestment * 100) : 0;
            const profitSign = totalProfit >= 0 ? '+' : '';

            // Period returns
            function getPeriodReturn(months) {
                if (!client.performanceHistory || client.performanceHistory.length < 2) return 'N/A';
                const hist = filterHistoryByRange(client.performanceHistory, months <= 1 ? '1m' : months <= 3 ? '3m' : '1y');
                if (hist.length < 2) return 'N/A';
                const startVal = hist[0].value;
                const endVal = hist[hist.length - 1].value;
                const ret = ((endVal - startVal) / startVal * 100);
                return (ret >= 0 ? '+' : '') + ret.toFixed(2) + '%';
            }

            // Holdings table
            let holdingsTableHTML = client.holdings.map(h => {
                const profit = h.value - h.costBasis;
                const ret = h.costBasis > 0 ? (profit / h.costBasis * 100) : 0;
                return `<tr><td>${h.type === 'stock' ? h.ticker : h.name}</td><td>${h.type === 'stock' ? 'מניה' : 'אג"ח'}</td><td>${h.allocationPct.toFixed(1)}%</td><td>${formatCurrency(h.value, h.currency)}</td><td style="color:${ret >= 0 ? 'green' : 'red'}">${(ret >= 0 ? '+' : '') + ret.toFixed(2)}%</td></tr>`;
            }).join('');

            const dateStr = new Date().toLocaleDateString('he-IL');

            // Close modal
            document.getElementById('modalOverlay').classList.remove('active');

            reportView.innerHTML = `

            <h1>דוח תיק השקעות</h1>

            <div class="report-stats-grid">
                <div class="report-stat"><div class="label">שווי תיק</div><div class="value">${formatCurrency(client.portfolioValue)}</div></div>
                <div class="report-stat"><div class="label">השקעה ראשונית</div><div class="value">${formatCurrency(client.initialInvestment)}</div></div>
                <div class="report-stat"><div class="label">רווח/הפסד</div><div class="value" style="color:${totalProfit >= 0 ? 'green' : 'red'}">${profitSign}${formatCurrency(Math.abs(totalProfit))}</div></div>
                <div class="report-stat"><div class="label">תשואה כוללת</div><div class="value" style="color:${totalReturn >= 0 ? 'green' : 'red'}">${profitSign}${totalReturn.toFixed(2)}%</div></div>
                <div class="report-stat"><div class="label">תשואה חודש</div><div class="value">${getPeriodReturn(1)}</div></div>

        // ========== MACRO NEWS PAGE ==========

        async function checkAlerts() {
            // Fetch real macro economic data from Trading Economics API
            try {
                const response = await fetchWithTimeout(
                    'https://api.tradingeconomics.com/calendar/country/united%20states?c=guest:guest&f=json&importance=3',
                    5000
                );
                if (!response.ok) throw new Error('API error');
                const data = await response.json();

                // Filter events that have actual values and are recent
                alerts = data
                    .filter(item => item.Actual !== null && item.Actual !== '' && item.Event)
                    .map(item => {
                        const eventDate = new Date(item.Date);
                        const category = MACRO_CATEGORY_MAP[item.Category] || MACRO_CATEGORY_MAP[item.Event] || 'כלכלה';
                        const alertId = `${item.CalendarId || item.Event + item.Date}`;

                        return {
                            id: alertId,
                            title: item.Event,
                            category: category,
                            actual: item.Actual !== null ? String(item.Actual) : 'N/A',
                            forecast: item.Forecast !== null ? String(item.Forecast) : 'N/A',
                            previous: item.Previous !== null ? String(item.Previous) : 'N/A',
                            date: eventDate.toLocaleDateString('he-IL'),
                            time: eventDate.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }),
                            source: item.Source || '',
                            country: item.Country || 'United States',
                            importance: item.Importance || 1,
                            isRead: readAlertIds.includes(alertId),
                            rawDate: eventDate
                        };
                    })
                    .sort((a, b) => b.rawDate - a.rawDate)
                    .slice(0, 30); // Keep latest 30 events

            } catch (e) {
                console.log('Trading Economics API unavailable, using fallback data');
                // Fallback: generate simulated data if API fails
                const now = new Date();
                const fallbackEvents = [
                    { name: 'Inflation Rate YoY', cat: 'אינפלציה' },
                    { name: 'Core CPI MoM', cat: 'אינפלציה' },
                    { name: 'PPI MoM', cat: 'אינפלציה' },
                    { name: 'GDP Growth Rate QoQ', cat: 'צמיחה' },
                    { name: 'Unemployment Rate', cat: 'תעסוקה' },
                    { name: 'Non Farm Payrolls', cat: 'תעסוקה' },
                    { name: 'Initial Jobless Claims', cat: 'תעסוקה' },
                    { name: 'Fed Interest Rate Decision', cat: 'מדיניות מוניטרית' },
                    { name: 'ISM Manufacturing PMI', cat: 'ייצור' },
                    { name: 'Retail Sales MoM', cat: 'צריכה' },
                    { name: 'Building Permits', cat: 'נדל"ן' },
                    { name: 'Michigan Consumer Sentiment', cat: 'סנטימנט' },
                ];
                alerts = fallbackEvents.map((evt, i) => {
                    const minutesAgo = i * 45 + Math.floor(Math.random() * 30);
                    const evtDate = new Date(now.getTime() - minutesAgo * 60000);
                    const alertId = `fallback-${evt.name}-${evtDate.toDateString()}`;
                    const v1 = (Math.random() * 5).toFixed(1);
                    const v2 = (Math.random() * 5).toFixed(1);
                    const v3 = (Math.random() * 5).toFixed(1);
                    return {
                        id: alertId, title: evt.name, category: evt.cat,
                        actual: v1 + '%', forecast: v2 + '%', previous: v3 + '%',
                        date: evtDate.toLocaleDateString('he-IL'),
                        time: evtDate.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }),
                        source: 'Simulated', country: 'United States', importance: 3,
                        isRead: readAlertIds.includes(alertId), rawDate: evtDate
                    };
                });
            }
        }
